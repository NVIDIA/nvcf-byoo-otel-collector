apiVersion: v1
kind: Pod
metadata:
  name: byoo-otel-collector
  labels:
    app.kubernetes.io/name: byoo-otel-collector
spec:
  imagePullSecrets:
    - name: ngc-registry-secret
  containers:
    - name: otel-collector
      image: nvcr.io/nvidia/byoo-otel-collector:dev
      imagePullPolicy: Always
      args:
        [
          "--byoo-accounts-secrets",
          "/var/secrets/accounts-secrets.json",
          "--byoo-secrets-folder",
          "/etc/byoo-otel-collector/secrets/",
          "--",
          "--config",
          "/etc/byoo-otel-collector/config.yaml",
        ]
      env:
        - name: OTEL_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
      volumeMounts:
        - name: accounts-secrets-volume
          mountPath: /var/secrets/accounts-secrets.json
          subPath: accounts-secrets.json
          readOnly: true
        - name: config-volume
          mountPath: /etc/byoo-otel-collector/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: otel-collector-secrets-volume
          mountPath: /etc/byoo-otel-collector/secrets
      ports:
        - containerPort: 8888
          name: metrics
          protocol: TCP
        - containerPort: 4357
          name: otlp-grpc
          protocol: TCP
        - containerPort: 4358
          name: otlp-http
          protocol: TCP
  volumes:
    - name: config-volume
      configMap:
        name: otel-config
    - name: accounts-secrets-volume
      configMap:
        name: accounts-secrets
    - name: otel-collector-secrets-volume
      emptyDir: {}
